version: '3.8'

# Development overrides - use with:
# docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      target: development
    volumes:
      - ../apps/backend/src:/app/src
    environment:
      - DEBUG=true
    command: uvicorn src.main:app --host 0.0.0.0 --port 3000 --reload

  db:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"
