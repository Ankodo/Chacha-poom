services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://proxyforge:devpassword@db:5432/proxyforge
      - REDIS_URL=redis://redis:6379/0
      - DEBUG=true
      - JWT_SECRET=dev-secret-key-not-for-production
      - CORS_ORIGINS=["http://localhost:3001","http://localhost:5173"]
      - NODE_AGENT_SECRET=dev-node-secret
      - SUB_DOMAIN=sub.localhost
    volumes:
      - ../apps/backend/src:/app/src
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proxyforge-dev

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=proxyforge
      - POSTGRES_USER=proxyforge
      - POSTGRES_PASSWORD=devpassword
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proxyforge"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proxyforge-dev

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - proxyforge-dev

volumes:
  pgdata_dev:

networks:
  proxyforge-dev:
    driver: bridge
