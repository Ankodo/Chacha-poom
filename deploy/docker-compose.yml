version: '3.8'

services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - DEBUG=${DEBUG:-false}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - BOT_TOKEN=${BOT_TOKEN}
      - NODE_AGENT_SECRET=${NODE_AGENT_SECRET}
      - SUB_DOMAIN=${SUB_DOMAIN}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - proxyforge

  admin-panel:
    build:
      context: ../apps/admin-panel
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxyforge

  client-site:
    build:
      context: ../apps/client-site
      dockerfile: Dockerfile
    ports:
      - "3002:3002"
    environment:
      - NUXT_PUBLIC_API_URL=http://localhost:3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxyforge

  telegram-bot:
    build:
      context: ../apps/telegram-bot
      dockerfile: Dockerfile
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_URL=http://backend:3000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxyforge

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-proxyforge}
      - POSTGRES_USER=${POSTGRES_USER:-proxyforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proxyforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - proxyforge

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - proxyforge

volumes:
  pgdata:
  redisdata:

networks:
  proxyforge:
    driver: bridge
