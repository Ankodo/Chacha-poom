services:
  backend:
    build:
      context: ../apps/backend
      dockerfile: Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ../.env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-proxyforge}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-proxyforge}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - proxyforge

  telegram-bot:
    build:
      context: ../apps/telegram-bot
      dockerfile: Dockerfile
    env_file:
      - ../.env
    environment:
      - API_URL=http://backend:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    networks:
      - proxyforge

  db:
    image: postgres:16-alpine
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-proxyforge}
      - POSTGRES_USER=${POSTGRES_USER:-proxyforge}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    # Optimize for 1GB RAM server
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=30
      -c wal_buffers=4MB
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proxyforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    networks:
      - proxyforge

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning --maxmemory 32mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped
    networks:
      - proxyforge

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
      - admin_dist:/srv/admin
      - client_dist:/srv/client
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 64M
    restart: unless-stopped
    networks:
      - proxyforge

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config:
  admin_dist:
  client_dist:

networks:
  proxyforge:
    driver: bridge
